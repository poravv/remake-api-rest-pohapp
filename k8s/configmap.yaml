apiVersion: v1
kind: ConfigMap
metadata:
  name: pohapp-backend-config
  namespace: pohapp-backend
data:
  # Database Configuration (usado por backend y job IA)
  DB_NAME: "db-pohapp"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_DATABASE: "db-pohapp"
  
  # Application Configuration
  APP_NAME: "Pohapp Backend API"
  API_VERSION: "v1.0.0"
  NODE_ENV: "production"
  
  # Model Configuration
  MODEL_VERSION: "v20250504"

  # Claude AI — claude-semantic-search
  # NOTA: ANTHROPIC_API_KEY es sensible → debe agregarse al Secret pohapp-backend-env-secrets
  CLAUDE_MODEL: "claude-haiku-4-5-20251001"
  CLAUDE_CATALOG_CACHE_KEY: "claude_catalog:v1"
  CLAUDE_CATALOG_TTL_SECONDS: "3600"

  # MinIO Configuration
  MINIO_BUCKET_NAME: "bucket-pohapp"
  MINIO_HOST: "minio.mindtechpy.net"
  MINIO_ENDPOINT: "minpoint.mindtechpy.net"
  MINIO_SIGNING_HOST: "minpoint.mindtechpy.net"
  MINIO_REGION: "py-east-1"

  # Firebase Configuration
  FIREBASE_PROJECT_ID: "pohapp-8f1ab"
  FIREBASE_SERVICE_ACCOUNT_PATH: "/etc/firebase/service-account.json"

  # Redis / Cache
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # Catalog reads (plantas, dolencias, pohãs) change only when admin
  # approves content. Invalidation is explicit via invalidateByPrefix()
  # on every mutation, so a longer TTL just reduces baseline DB load
  # without risk of stale reads.
  CACHE_TTL_SECONDS: "1800"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "120"
  RATE_LIMIT_AI_WINDOW_MS: "60000"
  RATE_LIMIT_AI_MAX: "30"

  # CORS — orígenes permitidos para /api/pohapp/** (whitelist estricta).
  # pohapp-admin.mindtechpy.net = consola admin web; localhost:3000 = dev local.
  # La app Flutter mobile NO requiere entrada (sin origen).
  CORS_ALLOWED_ORIGINS: "https://pohapp-admin.mindtechpy.net,http://localhost:3000"

  # Public API docs (Swagger UI) feature flag. 'true' en prod habilita
  # /api/pohapp/docs como endpoint público. Rollback instantáneo → 'false' + restart.
  ENABLE_SWAGGER_DOCS: "true"
