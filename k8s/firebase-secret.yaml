# Firebase Service Account Secret
#
# DO NOT commit actual secret values to git.
# This file is a placeholder/template for documentation purposes only.
#
# --- How to create the secret ---
#
# Option 1: From the JSON file directly
#   kubectl create secret generic firebase-service-account \
#     --from-file=service-account.json=./pohapp-8f1ab-firebase-adminsdk-1tllf-2ab153afae.json \
#     -n pohapp-backend
#
# Option 2: Via GitHub Actions (recommended for production)
#   Add the full JSON content as a GitHub Secret (e.g., FIREBASE_SERVICE_ACCOUNT_JSON),
#   then in the deploy workflow:
#     echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > /tmp/sa.json
#     kubectl create secret generic firebase-service-account \
#       --from-file=service-account.json=/tmp/sa.json \
#       -n pohapp-backend \
#       --dry-run=client -o yaml | kubectl apply -f -
#
# --- Placeholder manifest structure (for reference only) ---
apiVersion: v1
kind: Secret
metadata:
  name: firebase-service-account
  namespace: pohapp-backend
  labels:
    app: pohapp-backend
type: Opaque
data:
  # Base64-encoded content of the Firebase service account JSON file.
  # Generate with: cat service-account.json | base64
  service-account.json: "<BASE64_ENCODED_SERVICE_ACCOUNT_JSON>"
